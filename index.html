<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6C5CE7">
    <title>Polyglot Apex Cloud</title>
    <style>
        :root {
            --bg: #F0F2F5; --surface: #FFFFFF; --text-main: #2D3436; --text-sub: #636E72;
            --primary: #6C5CE7; --secondary: #00CEC9; --shadow: rgba(108, 92, 231, 0.15);
        }
        [data-theme="dark"] {
            --bg: #0F0C29; --surface: #1B1B2F; --text-main: #EFEFEF; --text-sub: #A0A0A0;
            --primary: #A29BFE; --shadow: rgba(0, 0, 0, 0.4);
        }
        body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text-main); transition: 0.3s; padding-bottom: 80px; }
        
        /* Header & Glassmorphism */
        .header-glass { padding: 25px 20px; background: var(--surface); border-radius: 0 0 30px 30px; box-shadow: 0 4px 20px var(--shadow); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .sync-status { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); margin-bottom: 4px; }

        /* Card System */
        .main-card { background: var(--surface); margin: 15px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px var(--shadow); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Inputs */
        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid transparent; background: var(--bg); color: var(--text-main); font-size: 16px; margin-bottom: 15px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: var(--surface); }

        /* Buttons */
        .btn-action { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 700; font-size: 16px; box-shadow: 0 8px 15px var(--shadow); cursor: pointer; transition: 0.2s; }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 2px 5px var(--shadow); }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); border-top: 1px solid var(--shadow); z-index: 100; }
        .nav-item { color: var(--text-sub); font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { color: var(--primary); opacity: 1; transform: scale(1.2); }

        .lang-pill { display: flex; align-items: center; padding: 20px; background: var(--surface); border-radius: 20px; margin-bottom: 12px; box-shadow: 0 4px 10px var(--shadow); cursor: pointer; }
        .hidden { display: none; }
        .topic-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>

    <div class="header-glass">
        <div>
            <div class="sync-status" id="sync-label">● Ready</div>
            <h2 id="current-title" style="margin:0; font-size: 22px;">Polyglot Apex</h2>
        </div>
        <div onclick="toggleTheme()" style="font-size: 24px; cursor: pointer;">🌓</div>
    </div>

    <div id="screen-lang" class="screen">
        <div style="padding: 20px;">
            <h3 style="color: var(--text-sub); margin-left: 10px;">Select Language</h3>
            <div class="lang-pill" onclick="selectLang('Thai')"><span style="font-size:30px; margin-right:15px">🇹🇭</span> <b>Thai</b></div>
            <div class="lang-pill" onclick="selectLang('Chinese')"><span style="font-size:30px; margin-right:15px">🇨🇳</span> <b>Chinese</b></div>
            <div class="lang-pill" onclick="selectLang('Korean')"><span style="font-size:30px; margin-right:15px">🇰🇷</span> <b>Korean</b></div>
        </div>
    </div>

    <div id="screen-input" class="screen hidden">
        <div class="main-card">
            <h3 style="margin-top:0">Add New Word</h3>
            <select id="topic-select" onchange="toggleTopicInput()"></select>
            <input type="text" id="topic-new" placeholder="Enter New Topic Name">
            <input type="text" id="word-target" placeholder="Foreign Word">
            <input type="text" id="word-translation" placeholder="Meaning">
            <button class="btn-action" onclick="saveVocab()">Save to Cloud ☁️</button>
        </div>
    </div>

    <div id="screen-list" class="screen hidden">
        <div id="list-container" style="padding: 10px;"></div>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <div class="main-card" style="text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center;">
            <div id="quiz-content"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="navTo('screen-lang')" id="nav-lang">🌍</div>
        <div class="nav-item" onclick="navTo('screen-input')" id="nav-input">✍️</div>
        <div class="nav-item" onclick="navTo('screen-list'); renderList();" id="nav-list">📚</div>
        <div class="nav-item" onclick="navTo('screen-quiz'); setupQuiz();" id="nav-quiz">⚡</div>
    </div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZdK3xJD4uSHxs6KKqNpx8XEj7fwNrodO3ldnrrdUzLv5tUosacAvmDRBq-u-tIaYk/exec"; 
    let currentLang = '';

    // --- THEME ---
    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('apex-theme', theme);
    }
    if(localStorage.getItem('apex-theme') === 'dark') toggleTheme();

    // --- NAVIGATION ---
    function navTo(screenId) {
        if(!currentLang && screenId !== 'screen-lang') {
            alert("Please pick a language first!");
            return;
        }
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const navId = 'nav-' + screenId.split('-')[1];
        document.getElementById(navId).classList.add('active');
    }

    function selectLang(lang) {
        currentLang = lang;
        document.getElementById('current-title').innerText = lang;
        openInputScreen();
        navTo('screen-input');
    }

    // --- DATA HANDLING ---
    function getLocalData() { 
        return JSON.parse(localStorage.getItem('apex_' + currentLang)) || {}; 
    }

    function openInputScreen() {
        const data = getLocalData();
        const select = document.getElementById('topic-select');
        select.innerHTML = '<option value="NEW">+ Create New Topic</option>';
        Object.keys(data).forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        toggleTopicInput();
    }

    function toggleTopicInput() {
        const isNew = document.getElementById('topic-select').value === "NEW";
        document.getElementById('topic-new').style.display = isNew ? 'block' : 'none';
    }

    async function saveVocab() {
        const select = document.getElementById('topic-select');
        let topic = select.value === "NEW" ? document.getElementById('topic-new').value.trim() : select.value;
        const target = document.getElementById('word-target').value.trim();
        const trans = document.getElementById('word-translation').value.trim();

        if(!topic || !target || !trans) return alert("Please fill all fields");

        const entry = { lang: currentLang, topic, target, trans };

        // 1. Save Locally (Instant)
        const data = getLocalData();
        if(!data[topic]) data[topic] = [];
        data[topic].push({ target, trans });
        localStorage.setItem('apex_' + currentLang, JSON.stringify(data));

        // 2. Clear UI
        document.getElementById('word-target').value = '';
        document.getElementById('word-translation').value = '';
        document.getElementById('sync-label').innerText = "⏳ Syncing...";

        // 3. Sync to Google Sheets (Background)
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(entry)
            });
            document.getElementById('sync-label').innerText = "✅ Cloud Synced";
        } catch (e) {
            document.getElementById('sync-label').innerText = "❌ Sync Failed";
            console.error(e);
        }

        renderList();
        navTo('screen-list');
    }

    function renderList() {
        const data = getLocalData();
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        for (let topic in data) {
            let section = `<div class="main-card"><span class="topic-tag">${topic}</span>`;
            data[topic].forEach((item, idx) => {
                section += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--bg)">
                    <b>${item.target}</b> <span style="color:var(--primary)">${item.trans}</span>
                </div>`;
            });
            section += `</div>`;
            container.innerHTML += section;
        }
    }

    function setupQuiz() {
        const data = getLocalData();
        let all = [];
        // Flatten all topics into one list for the quiz
        for(let t in data) {
            data[t].forEach(w => {
                // We store the topic name too, just in case you want to see it
                all.push({...w, topic: t});
            });
        }
        
        const area = document.getElementById('quiz-content');
        
        if(!all.length) { 
            area.innerHTML = "<h3>Add some words first!</h3>"; 
            return; 
        }

        // Pick a random word
        const q = all[Math.floor(Math.random() * all.length)];
        
        area.innerHTML = `
            <span class="topic-tag" style="background:var(--secondary)">${q.topic}</span>
            <p style="color:var(--text-sub); font-size:12px; font-weight:800; margin-top:10px">WRITE THE FOREIGN WORD FOR:</p>
            <h1 style="font-size:42px; margin:10px 0; color:var(--primary)">${q.trans}</h1>
            
            <input type="text" id="q-ans" 
                   placeholder="Type in ${currentLang}..." 
                   autocapitalize="none" 
                   autocomplete="off" 
                   spellcheck="false"
                   autofocus>
                   
            <button class="btn-action" onclick="checkQuiz('${q.target.trim()}')">Check Answer</button>
        `;
        
        // Focus the input automatically for faster typing
        setTimeout(() => document.getElementById('q-ans').focus(), 100);
    }

    function checkQuiz(correctWord) {
        const userAns = document.getElementById('q-ans').value.trim();
        
        // We compare exactly, but you might want to ignore casing for some languages
        if(userAns.toLowerCase() === correctWord.toLowerCase()) { 
            alert("Perfect! ✨\n" + userAns + " is correct."); 
            setupQuiz(); 
        } else { 
            alert("Not quite!\n\nThe correct word is: " + correctWord + "\nYou wrote: " + userAns); 
            // We don't call setupQuiz here so they can see the mistake
        }
    }

    function checkQuiz(correct) {
        const user = document.getElementById('q-ans').value.toLowerCase().trim();
        if(user === correct) { alert("Correct! ✨"); setupQuiz(); }
        else alert("Oops! It means: " + correct);
    }
</script>
</body>
</html>
