<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6C5CE7">
    <title>Polyglot Flow | Gamified</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+KR:wght@500;700&family=Noto+Sans+Thai:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #A29BFE;
            --accent: #00CEC9;
            --bg: #F8F9FE;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #2D3436;
            --text-light: #636E72;
            --glass: rgba(255, 255, 255, 0.7);
            --shadow: 0 20px 40px rgba(108, 92, 231, 0.08);
        }

        [data-theme="dark"] {
            --bg: #0C0C1E;
            --card-bg: rgba(30, 30, 50, 0.9);
            --text: #F1F2F6;
            --text-light: #A4A4B5;
            --glass: rgba(20, 20, 40, 0.7);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', 'Noto Sans KR', sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding-bottom: 120px;
        }

        /* --- Gamified Header --- */
        .header {
            padding: 20px; background: var(--glass); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .xp-bar-container {
            width: 100%; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden;
            position: relative;
        }
        .xp-bar-fill {
            height: 100%; width: 30%; background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.5s ease;
        }

        /* --- Language Tabs --- */
        .lang-tabs {
            display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
        }
        .lang-tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            padding: 10px 22px; border-radius: 16px; background: var(--card-bg);
            border: 2px solid transparent; white-space: nowrap; font-weight: 700; cursor: pointer;
            box-shadow: var(--shadow); transition: 0.3s; color: var(--text-light);
        }
        .tab.active {
            background: var(--primary); color: white; border-color: var(--secondary);
            transform: translateY(-3px);
        }

        /* --- Visual Cards --- */
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        .main-card {
            background: var(--card-bg); border-radius: 30px; padding: 25px;
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Interactive Inputs --- */
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; margin-left: 5px; }
        
        input, select, textarea {
            width: 100%; padding: 16px; border-radius: 20px; border: 2px solid transparent;
            background: rgba(0,0,0,0.03); color: var(--text); font-size: 16px; font-family: inherit;
            margin-top: 8px; transition: 0.3s;
        }
        [data-theme="dark"] input { background: rgba(255,255,255,0.05); }
        
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: var(--card-bg); }

        .btn-glow {
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); transition: 0.3s;
        }
        .btn-glow:active { transform: scale(0.95); opacity: 0.9; }

        /* --- Library Items --- */
        .item-card {
            background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 12px;
            box-shadow: var(--shadow); border-left: 6px solid var(--primary);
        }
        .item-topic { font-size: 10px; font-weight: 800; color: var(--text-light); text-transform: uppercase; margin-bottom: 5px; }
        .item-target { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
        .item-trans { font-size: 15px; color: var(--text-light); }

        /* --- Navigation --- */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px; background: var(--card-bg);
            border-radius: 25px; display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
        }
        .nav-link { color: var(--text-light); font-size: 22px; transition: 0.3s; position: relative; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: var(--primary); border-radius: 50%;
        }

        .hidden { display: none; }
        .pulse { animation: pulseAnim 0.3s ease; }
        @keyframes pulseAnim { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body data-theme="light">

    <div class="header">
        <div class="stats-row">
            <h2 style="margin:0; font-size: 18px; font-weight: 800;">PolyglotFlow</h2>
            <div id="sync-status" style="font-size: 11px; font-weight: 800; color: var(--accent);"><i class="fas fa-circle-check"></i> SAVED</div>
            <div onclick="toggleTheme()" style="cursor:pointer; font-size: 18px;"><i class="fas fa-moon"></i></div>
        </div>
        <div style="display:flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--text-light); margin-bottom: 4px;">
            <span>DAILY GOAL</span>
            <span id="xp-text">3/10 Words</span>
        </div>
        <div class="xp-bar-container">
            <div class="xp-bar-fill" id="xp-fill"></div>
        </div>
    </div>

    <div class="lang-tabs">
        <div class="tab active" onclick="selectLang('Thai')" data-lang="Thai">🇹🇭 Thai</div>
        <div class="tab" onclick="selectLang('Chinese')" data-lang="Chinese">🇨🇳 Chinese</div>
        <div class="tab" onclick="selectLang('Korean')" data-lang="Korean">🇰🇷 Korean</div>
    </div>

    <div id="screen-input" class="screen container">
        <div class="main-card">
            <div class="field">
                <label>Context / Topic</label>
                <select id="topic-select" onchange="toggleTopicInput()"></select>
                <input type="text" id="topic-new" placeholder="E.g. Restaurant, Travel..." style="margin-top:10px">
            </div>
            <div class="field">
                <label id="target-label">Thai Sentence</label>
                <textarea id="word-target" placeholder="Write it here..."></textarea>
            </div>
            <div class="field">
                <label>Meaning</label>
                <textarea id="word-translation" placeholder="What does it mean?"></textarea>
            </div>
            <button class="btn-glow" id="save-btn" onclick="saveVocab()">
                <i class="fas fa-magic"></i> Add to Library
            </button>
        </div>
    </div>

    <div id="screen-list" class="screen hidden container">
        <div id="list-container"></div>
    </div>

    <div id="screen-quiz" class="screen hidden container">
        <div class="main-card" id="quiz-content" style="text-align: center; min-height: 350px; display: flex; flex-direction: column; justify-content: center;">
        </div>
    </div>

    <nav class="nav">
        <div class="nav-link active" onclick="navTo('screen-input')"><i class="fas fa-plus-circle"></i></div>
        <div class="nav-link" onclick="navTo('screen-list')"><i class="fas fa-book-open"></i></div>
        <div class="nav-link" onclick="navTo('screen-quiz')"><i class="fas fa-bolt-lightning"></i></div>
    </nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZdK3xJD4uSHxs6KKqNpx8XEj7fwNrodO3ldnrrdUzLv5tUosacAvmDRBq-u-tIaYk/exec";
    let currentLang = 'Thai';
    let currentScreen = 'screen-input';
    let dailyCount = 0;

    window.onload = () => {
        selectLang('Thai');
        updateProgress();
    };

    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    function selectLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
        document.getElementById('target-label').innerText = `${lang} Sentence`;
        
        updateTopicDropdown();
        if (currentScreen === 'screen-list') renderList();
        if (currentScreen === 'screen-quiz') setupQuiz();
        syncFromCloud();
    }

    function navTo(screenId) {
        currentScreen = screenId;
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        
        document.querySelectorAll('.nav-link').forEach((l, idx) => {
            const screens = ['screen-input', 'screen-list', 'screen-quiz'];
            l.classList.toggle('active', screens[idx] === screenId);
        });

        if(screenId === 'screen-list') renderList();
        if(screenId === 'screen-quiz') setupQuiz();
    }

    function getLocalData() { return JSON.parse(localStorage.getItem('poly_' + currentLang)) || {}; }

    function updateTopicDropdown() {
        const data = getLocalData();
        const select = document.getElementById('topic-select');
        select.innerHTML = '<option value="NEW">+ Create New Topic</option>';
        Object.keys(data).forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        toggleTopicInput();
    }

    function toggleTopicInput() {
        document.getElementById('topic-new').style.display = document.getElementById('topic-select').value === "NEW" ? 'block' : 'none';
    }

    async function syncFromCloud() {
        const label = document.getElementById('sync-status');
        label.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING';
        try {
            const res = await fetch(SCRIPT_URL);
            const cloudData = await res.json();
            const organized = {};
            cloudData.forEach(item => {
                if (item.lang === currentLang) {
                    if (!organized[item.topic]) organized[item.topic] = [];
                    organized[item.topic].push({ target: item.target, trans: item.trans });
                }
            });
            localStorage.setItem('poly_' + currentLang, JSON.stringify(organized));
            label.innerHTML = '<i class="fas fa-circle-check"></i> UPDATED';
            updateTopicDropdown();
            if (currentScreen === 'screen-list') renderList();
        } catch (e) { label.innerHTML = '<i class="fas fa-circle-xmark"></i> OFFLINE'; }
    }

    function updateProgress() {
        const fill = document.getElementById('xp-fill');
        const text = document.getElementById('xp-text');
        const percentage = Math.min((dailyCount / 10) * 100, 100);
        fill.style.width = percentage + '%';
        text.innerText = `${dailyCount}/10 Words Today`;
    }

    async function saveVocab() {
        const topic = document.getElementById('topic-select').value === "NEW" ? document.getElementById('topic-new').value.trim() : document.getElementById('topic-select').value;
        const target = document.getElementById('word-target').value.trim();
        const trans = document.getElementById('word-translation').value.trim();

        if(!topic || !target || !trans) return;

        // Feedback
        const btn = document.getElementById('save-btn');
        btn.classList.add('pulse');
        setTimeout(() => btn.classList.remove('pulse'), 300);

        const data = getLocalData();
        if(!data[topic]) data[topic] = [];
        data[topic].push({ target, trans });
        localStorage.setItem('poly_' + currentLang, JSON.stringify(data));

        dailyCount++;
        updateProgress();

        document.getElementById('word-target').value = '';
        document.getElementById('word-translation').value = '';
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ lang: currentLang, topic, target, trans })
        });
        
        setTimeout(() => navTo('screen-list'), 500);
    }

    function renderList() {
        const data = getLocalData();
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        for (let topic in data) {
            data[topic].forEach(item => {
                container.innerHTML += `
                    <div class="item-card">
                        <div class="item-topic">${topic}</div>
                        <div class="item-target">${item.target}</div>
                        <div class="item-trans">${item.trans}</div>
                    </div>
                `;
            });
        }
    }

    function setupQuiz() {
        const data = getLocalData();
        let all = [];
        for(let t in data) data[t].forEach(w => all.push({...w, topic: t}));
        const area = document.getElementById('quiz-content');
        if(!all.length) { area.innerHTML = "<h3>Add words to unlock the quiz!</h3>"; return; }

        const q = all[Math.floor(Math.random() * all.length)];
        area.innerHTML = `
            <div class="item-topic">${q.topic}</div>
            <div style="font-size:12px; color:var(--primary); font-weight:800; margin-bottom:15px">HOW DO YOU SAY...</div>
            <div style="font-size:32px; font-weight:800; margin-bottom:30px;">${q.trans}</div>
            <textarea id="q-ans" placeholder="Type in ${currentLang}..." style="text-align:center; height:120px; font-size:18px;"></textarea>
            <button class="btn-glow" style="margin-top:20px" onclick="checkQuiz('${q.target.replace(/'/g, "\\'")}')">Check Answer</button>
        `;
        setTimeout(() => document.getElementById('q-ans').focus(), 100);
    }

    function checkQuiz(correct) {
        const userAns = document.getElementById('q-ans').value.trim();
        if (userAns.toLowerCase() === correct.toLowerCase()) {
            alert("✨ Awesome! You got it right.");
            setupQuiz();
        } else {
            alert("Not quite!\n\nThe correct way is:\n" + correct);
        }
    }
</script>
</body>
</html>
