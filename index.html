<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polyglot Flow | Multi-JSON Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+KR:wght@500;700&family=Noto+Sans+Thai:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6C5CE7; --secondary: #A29BFE; --accent: #00CEC9; --bg: #0C0C1E;
            --card-bg: rgba(30, 30, 50, 0.9); --text: #F1F2F6; --text-light: #A4A4B5;
            --glass: rgba(20, 20, 40, 0.7); --shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        [data-theme="light"] {
            --bg: #F8F9FE; --card-bg: rgba(255, 255, 255, 0.9); --text: #2D3436;
            --text-light: #636E72; --glass: rgba(255, 255, 255, 0.7); --shadow: 0 20px 40px rgba(108, 92, 231, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', 'Noto Sans KR', sans-serif;
            margin: 0; background: var(--bg); color: var(--text); padding-bottom: 120px;
            transition: background 0.3s;
        }

        .header { padding: 20px; background: var(--glass); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .lang-tabs { display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 10px 22px; border-radius: 16px; background: var(--card-bg); font-weight: 700; cursor: pointer; box-shadow: var(--shadow); transition: 0.3s; color: var(--text-light); white-space: nowrap; border: 2px solid transparent; }
        .tab.active { background: var(--primary); color: white; border-color: var(--secondary); transform: translateY(-3px); }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .main-card { background: var(--card-bg); border-radius: 30px; padding: 25px; box-shadow: var(--shadow); backdrop-filter: blur(10px); margin-bottom: 20px; }

        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-left: 5px; }
        textarea, select, input { width: 100%; padding: 16px; border-radius: 20px; border: none; background: rgba(255,255,255,0.05); color: var(--text); margin-top: 8px; font-family: inherit; box-sizing: border-box; }
        
        .btn-glow { width: 100%; padding: 20px; border-radius: 22px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 800; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); cursor: pointer; }
        
        .item-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 12px; box-shadow: var(--shadow); border-left: 6px solid var(--primary); }
        .item-target { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        
        .reading-section { background: linear-gradient(145deg, var(--primary), var(--secondary)); color: white; border-radius: 24px; padding: 25px; margin-bottom: 25px; line-height: 1.8; }

        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; background: var(--card-bg); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-link { color: var(--text-light); font-size: 22px; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--primary); transform: translateY(-5px); }
        
        .hidden { display: none; }
        
        /* Matching Grid */
        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .match-btn { padding: 15px; border-radius: 15px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); cursor: pointer; font-size: 14px; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .match-btn.selected { background: var(--primary); border-color: var(--secondary); }
        .match-btn.matched { visibility: hidden; }
    </style>
</head>
<body data-theme="dark">

    <div class="header">
        <div class="stats-row">
            <h2 style="margin:0; font-size: 18px;">PolyglotFlow</h2>
            <div id="status" style="font-size: 11px; font-weight: 800; color: var(--accent);">READY</div>
            <div onclick="toggleTheme()" style="cursor:pointer;"><i class="fas fa-moon"></i></div>
        </div>
    </div>

    <div class="lang-tabs" id="lang-tabs">
        <div class="tab active" onclick="changeLanguage('Thai')">🇹🇭 Thai</div>
        <div class="tab" onclick="changeLanguage('Chinese')">🇨🇳 Chinese</div>
        <div class="tab" onclick="changeLanguage('Korean')">🇰🇷 Korean</div>
    </div>

    <div id="screen-list" class="screen container">
        <div id="paragraph-area"></div>
        <div id="list-area"></div>
    </div>

    <div id="screen-quiz" class="screen hidden container">
        <div class="main-card" id="quiz-area"></div>
    </div>

    <div id="screen-input" class="screen hidden container">
        <div class="main-card">
            <div class="field"><label>New Word</label><input type="text" id="new-target"></div>
            <div class="field"><label>Translation</label><input type="text" id="new-trans"></div>
            <button class="btn-glow" onclick="addNewWord()">Add Manually</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-link active" onclick="navTo('screen-list')"><i class="fas fa-book-open"></i></div>
        <div class="nav-link" onclick="navTo('screen-quiz')"><i class="fas fa-gamepad"></i></div>
        <div class="nav-link" onclick="navTo('screen-input')"><i class="fas fa-plus"></i></div>
    </nav>

<script>
    let currentLang = 'Thai';
    let langData = {};

    async function loadLangFile(lang) {
        const status = document.getElementById('status');
        status.innerText = "LOADING...";
        try {
            // This fetches your external JSON file (e.g., Thai.json)
            const response = await fetch(`${lang}.json`);
            if (!response.ok) throw new Error('File not found');
            langData = await response.json();
            status.innerText = "LOADED";
            renderList();
        } catch (err) {
            console.error(err);
            status.innerText = "FILE ERROR";
            // Fallback to empty if file is missing
            langData = { Vocabulary_List: "", Paragraph: "File not found." };
            renderList();
        }
    }

    function changeLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(lang)));
        loadLangFile(lang);
    }

    function renderList() {
        const listArea = document.getElementById('list-area');
        const paraArea = document.getElementById('paragraph-area');
        listArea.innerHTML = '';
        
        // Render Paragraph
        paraArea.innerHTML = `<div class="reading-section"><h3><i class="fas fa-quote-left"></i> Advanced Reading</h3>${langData.Paragraph || ""}</div>`;

        // Parse Vocabulary_List String into Cards
        // Assuming your JSON format: "word = meaning, word = meaning"
        if(langData.Vocabulary_List) {
            const pairs = langData.Vocabulary_List.split(',').map(p => p.trim());
            pairs.forEach(p => {
                const [word, mean] = p.split('=').map(i => i.trim());
                if(word && mean) {
                    listArea.innerHTML += `
                        <div class="item-card">
                            <div class="item-target">${word}</div>
                            <div style="color: var(--text-light); font-size: 14px;">${mean}</div>
                        </div>`;
                }
            });
        }
    }

    function navTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => {
            l.classList.toggle('active', l.getAttribute('onclick').includes(screenId));
        });
        if(screenId === 'screen-quiz') startQuiz();
    }

    function startQuiz() {
        const quizArea = document.getElementById('quiz-area');
        if(!langData.Vocabulary_List) { quizArea.innerHTML = "No data loaded."; return; }
        
        // Simple Random Word Quiz
        const pairs = langData.Vocabulary_List.split(',').map(p => p.trim());
        const randomPair = pairs[Math.floor(Math.random() * pairs.length)];
        const [word, mean] = randomPair.split('=').map(i => i.trim());

        quizArea.innerHTML = `
            <div style="text-align:center">
                <p style="color:var(--primary); font-weight:800">TRANSLATE THIS:</p>
                <h2>${mean}</h2>
                <input type="text" id="quiz-input" placeholder="Type in ${currentLang}..." style="text-align:center">
                <button class="btn-glow" style="margin-top:20px" onclick="checkAnswer('${word}')">Check</button>
            </div>
        `;
    }

    function checkAnswer(correct) {
        const input = document.getElementById('quiz-input').value.trim();
        if(input === correct) {
            alert("Correct! 🎉");
            startQuiz();
        } else {
            alert("Almost! The word is: " + correct);
        }
    }

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // Initial Load
    window.onload = () => loadLangFile('Thai');
</script>
</body>
</html>
