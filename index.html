<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polyglot Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6C5CE7; --accent: #00CEC9; --bg: #0C0C1E;
            --card-bg: rgba(30, 30, 50, 0.9); --text: #F1F2F6; --text-light: #A4A4B5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-thai: 'Sarabun', sans-serif; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-main);
            margin: 0; background: var(--bg); color: var(--text); 
            line-height: 1.6; padding-bottom: 120px; overflow-x: hidden;
        }
        .vocab-word, .s-target, .paragraph-text, .m-btn, input { font-family: var(--font-thai), var(--font-main); }
        .header { padding: 45px 20px 15px; text-align: center; }
        .status-badge { font-size: 10px; letter-spacing: 2.5px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        h1 { margin: 8px 0 0; font-weight: 800; font-size: 22px; color: #fff; letter-spacing: -0.5px; }
        .tabs-container { display: flex; gap: 10px; padding: 20px; overflow-x: auto; scrollbar-width: none; justify-content: center; }
        .tab { 
            padding: 11px 22px; border-radius: 12px; background: var(--card-bg); 
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 13px;
            color: var(--text-light); border: 1px solid rgba(255,255,255,0.05);
        }
        .tab.active { background: var(--primary); color: white; transform: translateY(-1px); }
        .container { max-width: 500px; margin: 0 auto; padding: 0 20px; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        select, input { 
            width: 100%; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 16px; border-radius: 16px; font-family: var(--font-main); 
            font-weight: 600; font-size: 15px; outline: none;
        }
        .content-card { 
            background: var(--card-bg); border-radius: 30px; padding: 28px; 
            border: 1px solid rgba(255,255,255,0.05); min-height: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .vocab-row { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .vocab-row:active { background: rgba(255,255,255,0.02); }
        .vocab-word { font-size: 22px; font-weight: 600; color: #fff; display: block; }
        .vocab-mean { font-size: 14px; color: var(--text-light); }
        .fa-volume-high { float: right; color: var(--primary); font-size: 14px; margin-top: 10px; opacity: 0.6; }
        
        .sentence-box { margin-bottom: 22px; padding-left: 18px; border-left: 4px solid var(--primary); cursor: pointer; }
        .s-target { font-size: 20px; font-weight: 600; color: #fff; }
        .s-trans { font-size: 14px; color: var(--text-light); font-style: italic; }
        
        /* Audio Popup Style */
        .audio-popup {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 20px; font-weight: 600; font-size: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
            opacity: 0; transition: 0.3s; pointer-events: none; text-align: center;
        }
        .audio-popup.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .paragraph-text { font-size: 20px; line-height: 2.1; color: #eee; white-space: pre-line; }
        .progress-text { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-align: center; margin-bottom: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .m-btn { 
            padding: 14px; border-radius: 18px; background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.08); color: #fff; cursor: pointer;
            min-height: 75px; display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 15px; font-weight: 600; transition: 0.25s;
        }
        .m-btn.selected { background: var(--primary); transform: scale(0.97); }
        .m-btn.matched { opacity: 0; pointer-events: none; transform: scale(0.8); }
        .nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            background: rgba(10, 10, 25, 0.95); backdrop-filter: blur(20px); 
            padding: 14px 25px; border-radius: 40px; display: flex; gap: 30px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000; width: max-content;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-light); cursor: pointer; transition: 0.3s; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item.active { color: var(--primary); }
        .hidden { display: none; }
        
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 10px; color: var(--accent); font-weight: 800; margin-bottom: 5px; display: block; }
        .submit-btn { 
            background: var(--primary); color: white; border: none; width: 100%; 
            padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="status-badge" id="status">Connecting</div>
    <h1>Polyglot Flow</h1>
</div>

<div class="tabs-container">
    <div class="tab active" onclick="switchLang('Thai')">THAI</div>
    <div class="tab" onclick="switchLang('Chinese')">CHINESE</div>
    <div class="tab" onclick="switchLang('Korean')">KOREAN</div>
</div>

<div id="audio-toast" class="audio-popup"></div>

<div id="view-study" class="container">
    <div class="controls">
        <select id="study-chapter" onchange="renderStudy()"></select>
        <select id="study-mode" onchange="renderStudy()">
            <option value="vocab">Vocabulary List</option>
            <option value="sentences">Example Sentences</option>
            <option value="paragraph">Reading Paragraph</option>
        </select>
    </div>
    <div id="study-display" class="content-card"></div>
</div>

<div id="view-game" class="container hidden">
    <div class="controls"><select id="game-chapter" onchange="resetGame()"></select></div>
    <div id="game-display" class="content-card"></div>
</div>

<div id="view-upload" class="container hidden">
    <div class="content-card">
        <span class="status-badge">Add New to <span id="target-lang-label">Thai</span></span>
        <div style="margin-top:20px;"></div>
        <div class="input-group">
            <span class="input-label">TOPIC / CATEGORY</span>
            <input type="text" id="in-topic" placeholder="e.g. Food, Travel">
        </div>
        <div class="input-group">
            <span class="input-label">WORD</span>
            <input type="text" id="in-word" placeholder="Target Word">
        </div>
        <div class="input-group">
            <span class="input-label">MEANING</span>
            <input type="text" id="in-mean" placeholder="Translation">
        </div>
        <button class="submit-btn" onclick="submitNewWord()">SAVE TO CLOUD</button>
    </div>
</div>

<div id="view-star" class="container hidden">
    <div id="star-display" class="content-card"></div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchView('study')"><i class="fas fa-book-open"></i><span>Learn</span></div>
    <div class="nav-item" onclick="switchView('game')"><i class="fas fa-layer-group"></i><span>Match</span></div>
    <div class="nav-item" onclick="switchView('upload')"><i class="fas fa-cloud-upload-alt"></i><span>Add</span></div>
    <div class="nav-item" onclick="switchView('star')"><i class="fas fa-star"></i><span>My List</span></div>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZdK3xJD4uSHxs6KKqNpx8XEj7fwNrodO3ldnrrdUzLv5tUosacAvmDRBq-u-tIaYk/exec";
    let rawData = null;
    let customData = []; 
    let currentLang = 'Thai';
    let currentView = 'study';
    let selectedLeft = null;
    let gamePool = []; 
    let wordsCleared = 0; 
    let totalWords = 0;

    const fileMap = { 'Thai': 'Thai.json', 'Chinese': 'chinese.json', 'Korean': 'korea.json' };

    // --- Audio Function with Popup and Dual-Sound Fix ---
    function speak(text, lang) {
        if (!text) return;
        window.speechSynthesis.cancel(); 

        // 1. Show the Popup with Full Text (Pinyin included)
        const toast = document.getElementById('audio-toast');
        toast.innerText = text;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);

        // 2. Clean text for Voice Engine (Native Only)
        let cleanText = text;
        if (lang === 'Chinese') {
            cleanText = text.replace(/[^\u4e00-\u9fa5]/g, '');
        } else if (lang === 'Thai') {
            cleanText = text.replace(/[^\u0E00-\u0E7F]/g, '');
        } else if (lang === 'Korean') {
            cleanText = text.replace(/[^\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F]/g, '');
        }

        // 3. Trigger Voice
        if (cleanText.trim().length > 0) {
            const msg = new SpeechSynthesisUtterance(cleanText);
            if (lang === 'Thai') msg.lang = 'th-TH';
            else if (lang === 'Chinese') msg.lang = 'zh-CN';
            else if (lang === 'Korean') msg.lang = 'ko-KR';
            msg.rate = 0.9; 
            window.speechSynthesis.speak(msg);
        }
    }

    async function switchLang(lang) {
        currentLang = lang;
        document.getElementById('target-lang-label').innerText = lang;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === lang.toUpperCase()));
        await fetchData();
        if(currentView === 'star') renderStarList();
    }

    async function switchView(view) {
        currentView = view;
        const views = ['view-study', 'view-game', 'view-upload', 'view-star'];
        views.forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        
        document.querySelectorAll('.nav-item').forEach(n => {
            const label = n.querySelector('span').innerText.toLowerCase();
            n.classList.toggle('active', label === (view === 'study' ? 'learn' : view === 'game' ? 'match' : view));
        });

        if(view === 'game') resetGame(); 
        else if(view === 'study') renderStudy();
        else if(view === 'star') renderStarList();
    }

    async function fetchData() {
        try {
            const response = await fetch(`./${fileMap[currentLang]}?v=${new Date().getTime()}`);
            const data = await response.json();
            rawData = Array.isArray(data) ? data : [data];
            populateChapters();
            
            const cloudRes = await fetch(SCRIPT_URL);
            customData = await cloudRes.json();
            document.getElementById('status').innerText = "System Live";
        } catch (e) { 
            console.error(e);
            document.getElementById('status').innerText = "Sync Error"; 
        }
    }

    function renderStarList() {
        const display = document.getElementById('star-display');
        const filtered = customData.filter(item => item.lang === currentLang);
        display.innerHTML = `<span class="status-badge">My ${currentLang} List</span><div style="margin-top:20px;"></div>`;
        
        if(filtered.length === 0) {
            display.innerHTML += "<p style='text-align:center; padding-top:100px; color:var(--text-light)'>No saved words yet.</p>";
            return;
        }

        filtered.reverse().forEach(item => {
            display.innerHTML += `
                <div class="vocab-row" onclick="speak('${item.target}', '${currentLang}')">
                    <i class="fa-solid fa-volume-high"></i>
                    <span style="font-size:10px; color:var(--accent); font-weight:800;">${item.topic.toUpperCase()}</span>
                    <span class="vocab-word">${item.target}</span>
                    <span class="vocab-mean">${item.trans}</span>
                </div>`;
        });
    }

    async function submitNewWord() {
        const btn = document.querySelector('.submit-btn');
        const payload = {
            lang: currentLang,
            topic: document.getElementById('in-topic').value || "General",
            target: document.getElementById('in-word').value,
            trans: document.getElementById('in-mean').value
        };

        if(!payload.target || !payload.trans) return alert("Please fill Word and Meaning");
        btn.innerText = "SAVING...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            document.getElementById('in-word').value = "";
            document.getElementById('in-mean').value = "";
            alert("Saved successfully!");
            await fetchData();
            switchView('star');
        } catch (e) { alert("Error saving"); }
        finally { btn.innerText = "SAVE TO CLOUD"; btn.disabled = false; }
    }

    function populateChapters() {
        const studySelect = document.getElementById('study-chapter');
        const gameSelect = document.getElementById('game-chapter');
        if (!rawData || rawData.length === 0) return;
        const options = rawData.map((ch, i) => `<option value="${i}">${ch.Chapter_name || 'Chapter ' + (i+1)}</option>`).join('');
        studySelect.innerHTML = options;
        gameSelect.innerHTML = options;
        renderStudy();
    }

    function renderStudy() {
        const studySelect = document.getElementById('study-chapter');
        const index = studySelect.value || 0;
        const mode = document.getElementById('study-mode').value;
        const display = document.getElementById('study-display');
        if(!rawData || !rawData[index]) return;
        const ch = rawData[index];
        display.innerHTML = `<span style="font-size:10px; color:var(--primary); font-weight:800; letter-spacing:1px;">${ch.Chapter_name}</span><div style="margin-top:20px;"></div>`;
        
        if (mode === 'vocab') {
            const list = ch.Vocabulary_List || "";
            list.split(',').forEach(v => {
                const p = v.split('=').map(s => s.trim());
                if(p.length >= 2) {
                    display.innerHTML += `
                    <div class="vocab-row" onclick="speak('${p[0]}', '${currentLang}')">
                        <i class="fa-solid fa-volume-high"></i>
                        <span class="vocab-word">${p[0]}</span>
                        <span class="vocab-mean">${p[1]}</span>
                    </div>`;
                }
            });
        } else if (mode === 'sentences') {
            const sentences = ch.Sentences || "";
            sentences.split(';').forEach(s => {
                const p = s.split(':').map(i => i.trim());
                if(p.length >= 2) {
                    display.innerHTML += `
                    <div class="sentence-box" onclick="speak('${p[0]}', '${currentLang}')">
                        <div class="s-target">${p[0]}</div>
                        <div class="s-trans">${p[1]}</div>
                    </div>`;
                }
            });
        } else if (mode === 'paragraph') {
            display.innerHTML += `<div class="paragraph-text" onclick="speak(this.innerText, '${currentLang}')">${ch.Paragraph || "No text available."}</div>`;
        }
    }

    function resetGame() {
        if(!rawData) return;
        const index = document.getElementById('game-chapter').value || 0;
        const ch = rawData[index];
        if(!ch) return;
        const list = ch.Vocabulary_List || "";
        gamePool = list.split(',').map(v => {
            const p = v.split('=').map(s => s.trim());
            return { t: p[0], e: p[1] };
        }).filter(x => x.t && x.e);
        totalWords = gamePool.length; 
        wordsCleared = 0;
        renderGameRound();
    }

    function renderGameRound() {
        const display = document.getElementById('game-display');
        if (gamePool.length === 0) {
            display.innerHTML = `<div style="text-align:center; padding-top:60px;"><h2 style="font-weight:800;">MASTERY COMPLETE</h2><button onclick="resetGame()" style="background:var(--primary); color:white; border:none; padding:18px 40px; border-radius:18px; font-weight:700; cursor:pointer; margin-top:15px;">PLAY AGAIN</button></div>`;
            return;
        }
        const currentRound = gamePool.slice(0, 5);
        const leftSide = [...currentRound].sort(() => 0.5 - Math.random());
        const rightSide = [...currentRound].sort(() => 0.5 - Math.random());
        display.innerHTML = `<div class="progress-text">Progress: ${wordsCleared} / ${totalWords} Words</div><div class="grid" id="g"></div>`;
        const g = document.getElementById('g');
        leftSide.forEach((item, i) => {
            g.innerHTML += `<div class="m-btn" data-v="${leftSide[i].t}" onclick="match(this, 'L')">${leftSide[i].e}</div>`;
            g.innerHTML += `<div class="m-btn" data-v="${rightSide[i].t}" onclick="match(this, 'R')">${rightSide[i].t}</div>`;
        });
    }

    function match(btn, side) {
        if(btn.classList.contains('matched')) return;
        if(side === 'L') {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('selected'));
            selectedLeft = btn; btn.classList.add('selected');
        } else {
            if(!selectedLeft) return;
            if(selectedLeft.dataset.v === btn.dataset.v) {
                speak(btn.dataset.v, currentLang);
                selectedLeft.classList.add('matched'); btn.classList.add('matched');
                selectedLeft = null;
                if(document.querySelectorAll('.m-btn:not(.matched)').length === 0) {
                    wordsCleared += Math.min(5, gamePool.length);
                    gamePool = gamePool.slice(5); setTimeout(renderGameRound, 600);
                }
            } else {
                btn.style.borderColor = "#ff7675";
                setTimeout(() => btn.style.borderColor = "rgba(255,255,255,0.08)", 400);
            }
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
