<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polyglot Flow | High-End Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6C5CE7; --secondary: #A29BFE; --accent: #00CEC9; --bg: #0C0C1E;
            --card-bg: rgba(30, 30, 50, 0.9); --text: #F1F2F6; --text-light: #A4A4B5;
            --font-main: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
        }

        body {
            font-family: var(--font-main);
            margin: 0; background: var(--bg); color: var(--text); 
            line-height: 1.6; padding-bottom: 120px; transition: 0.3s;
        }

        /* Header & Labels */
        .header { padding: 40px 20px 20px; text-align: center; }
        .status-badge { font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        h1 { margin: 0; font-weight: 800; font-size: 24px; letter-spacing: -1px; }

        /* Tabs */
        .tabs-container { display: flex; gap: 10px; padding: 20px; overflow-x: auto; scrollbar-width: none; }
        .tab { 
            padding: 12px 24px; border-radius: 16px; background: var(--card-bg); 
            font-weight: 700; cursor: pointer; transition: 0.4s;
            color: var(--text-light); white-space: nowrap; border: 1px solid rgba(255,255,255,0.05);
        }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); }

        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }

        /* Selectors */
        .mode-selector { 
            width: 100%; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 18px; border-radius: 20px; font-family: var(--font-main); 
            font-weight: 600; font-size: 16px; margin-bottom: 25px; cursor: pointer;
        }

        /* Content Area */
        .content-card { background: var(--card-bg); border-radius: 32px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); min-height: 300px; }
        .chapter-label { color: var(--primary); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        /* Elements */
        .vocab-row { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .vocab-word { font-size: 20px; font-weight: 700; color: #fff; }
        .vocab-mean { font-size: 14px; color: var(--text-light); }

        .sentence-box { margin-bottom: 25px; padding-left: 20px; border-left: 4px solid var(--primary); }
        .s-target { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .s-trans { font-size: 14px; color: var(--text-light); }

        .reading-text { font-size: 18px; line-height: 2.2; text-align: justify; word-break: break-word; color: #E0E0E0; }

        /* Matching Game */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .m-btn { 
            padding: 15px; border-radius: 18px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer;
            min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center;
            font-weight: 600; transition: 0.2s;
        }
        .m-btn.selected { background: var(--primary); border-color: var(--secondary); transform: scale(0.96); }
        .m-btn.matched { visibility: hidden; pointer-events: none; }

        /* Navigation */
        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(30, 30, 50, 0.8); backdrop-filter: blur(20px); padding: 15px 30px; border-radius: 40px; display: flex; gap: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .nav i { font-size: 20px; color: var(--text-light); cursor: pointer; }
        .nav i.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div class="status-badge" id="status">Syncing...</div>
    <h1 id="chapter-title">SELECT LANGUAGE</h1>
</div>

<div class="tabs-container">
    <div class="tab active" onclick="loadLang('Thai')">🇹🇭 THAI</div>
    <div class="tab" onclick="loadLang('Chinese')">🇨🇳 CHINESE</div>
    <div class="tab" onclick="loadLang('Korean')">🇰🇷 KOREAN</div>
</div>

<div class="container">
    <select class="mode-selector" id="mode" onchange="render()">
        <option value="vocab">Vocabulary List</option>
        <option value="sentences">Example Sentences</option>
        <option value="paragraph">Reading Paragraph</option>
        <option value="game">Matching Game (5x5)</option>
    </select>

    <div id="display" class="content-card"></div>
</div>

<nav class="nav">
    <i class="fas fa-home active"></i>
    <i class="fas fa-book" onclick="render()"></i>
    <i class="fas fa-cog"></i>
</nav>

<script>
    let currentData = null;
    let selectedLeft = null;

    async function loadLang(lang) {
        const status = document.getElementById('status');
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(lang.toUpperCase())));
        
        try {
            const res = await fetch(`${lang}.json`);
            currentData = await res.json();
            document.getElementById('chapter-title').innerText = currentData.Chapter_name.replace(/_/g, ' ').toUpperCase();
            status.innerText = "Data Connected";
            render();
        } catch (e) {
            status.innerText = "File Not Found";
            document.getElementById('display').innerHTML = `<p style="text-align:center; opacity:0.5">Please ensure ${lang}.json is in the folder and you are using a local server.</p>`;
        }
    }

    function render() {
        if(!currentData) return;
        const mode = document.getElementById('mode').value;
        const display = document.getElementById('display');
        display.innerHTML = `<span class="chapter-label">${currentData.Chapter_name}</span>`;

        if (mode === 'vocab') {
            const items = currentData.Vocabulary_List.split(',').map(v => v.trim());
            items.forEach(item => {
                const [word, mean] = item.split('=').map(s => s.trim());
                display.innerHTML += `<div class="vocab-row"><div class="vocab-word">${word}</div><div class="vocab-mean">${mean}</div></div>`;
            });
        } 
        else if (mode === 'sentences') {
            const sentences = currentData.Sentences.split(';').map(s => s.trim());
            sentences.forEach(s => {
                const [target, trans] = s.split(':').map(i => i.trim());
                if(target && trans) {
                    display.innerHTML += `<div class="sentence-box"><div class="s-target">${target}</div><div class="s-trans">${trans}</div></div>`;
                }
            });
        } 
        else if (mode === 'paragraph') {
            display.innerHTML += `<div class="reading-text">${currentData.Paragraph}</div>`;
        } 
        else if (mode === 'game') {
            setupGame();
        }
    }

    function setupGame() {
        const display = document.getElementById('display');
        const all = currentData.Vocabulary_List.split(',').map(v => {
            const [t, e] = v.split('=').map(s => s.trim());
            return { t, e };
        }).sort(() => 0.5 - Math.random()).slice(0, 5);

        const leftSide = [...all].sort(() => 0.5 - Math.random());
        const rightSide = [...all].sort(() => 0.5 - Math.random());

        display.innerHTML += `<div class="grid" id="g"></div>`;
        const g = document.getElementById('g');
        
        for(let i=0; i<5; i++) {
            g.innerHTML += `<div class="m-btn" data-v="${leftSide[i].t}" onclick="match(this, 'L')">${leftSide[i].e}</div>`;
            g.innerHTML += `<div class="m-btn" data-v="${rightSide[i].t}" onclick="match(this, 'R')">${rightSide[i].t}</div>`;
        }
    }

    function match(btn, side) {
        if(btn.classList.contains('matched')) return;
        if(side === 'L') {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('selected'));
            selectedLeft = btn;
            btn.classList.add('selected');
        } else {
            if(!selectedLeft) return;
            if(selectedLeft.dataset.v === btn.dataset.v) {
                selectedLeft.classList.add('matched');
                btn.classList.add('matched');
                selectedLeft = null;
                if(document.querySelectorAll('.m-btn:not(.matched)').length === 0) {
                    document.getElementById('display').innerHTML += `<h2 style="text-align:center; color:var(--accent)">MATCH COMPLETE!</h2>`;
                }
            } else {
                btn.style.borderColor = "#ff7675";
                setTimeout(() => btn.style.borderColor = "rgba(255,255,255,0.1)", 500);
            }
        }
    }

    window.onload = () => loadLang('Thai');
</script>
</body>
</html>
