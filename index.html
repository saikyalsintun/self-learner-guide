<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polyglot Flow | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6C5CE7; --accent: #00CEC9; --bg: #0C0C1E;
            --card-bg: rgba(30, 30, 50, 0.9); --text: #F1F2F6; --text-light: #A4A4B5;
            --font-main: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
        }

        body {
            font-family: var(--font-main);
            margin: 0; background: var(--bg); color: var(--text); 
            line-height: 1.6; padding-bottom: 120px; overflow-x: hidden;
        }

        /* Top Header */
        .header { padding: 40px 20px 10px; text-align: center; }
        .status-badge { font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        h1 { margin: 0; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: #fff; }

        /* Tabs */
        .tabs-container { display: flex; gap: 8px; padding: 15px; overflow-x: auto; scrollbar-width: none; justify-content: center; }
        .tab { 
            padding: 8px 18px; border-radius: 12px; background: var(--card-bg); 
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 12px;
            color: var(--text-light); border: 1px solid rgba(255,255,255,0.05);
        }
        .tab.active { background: var(--primary); color: white; }

        .container { max-width: 500px; margin: 0 auto; padding: 0 20px; }

        /* View Content Styles */
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        select { 
            width: 100%; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 14px; border-radius: 14px; font-family: var(--font-main); 
            font-weight: 600; font-size: 14px; outline: none; appearance: none;
        }

        .content-card { background: var(--card-bg); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); min-height: 300px; }
        
        .vocab-row { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .vocab-word { font-size: 18px; font-weight: 700; color: #fff; display: block; }
        .vocab-mean { font-size: 13px; color: var(--text-light); }

        .sentence-box { margin-bottom: 15px; padding-left: 12px; border-left: 3px solid var(--primary); }
        .s-target { font-size: 16px; font-weight: 600; color: #fff; }
        .s-trans { font-size: 13px; color: var(--text-light); }

        /* Matching Game Screen */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .m-btn { 
            padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); color: #fff; cursor: pointer;
            min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 13px; font-weight: 600; transition: 0.2s;
        }
        .m-btn.selected { background: var(--primary); border-color: var(--accent); }
        .m-btn.matched { visibility: hidden; pointer-events: none; }

        /* Navigation Menu */
        .nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(15, 15, 30, 0.95); backdrop-filter: blur(20px); 
            padding: 12px 30px; border-radius: 35px; display: flex; gap: 35px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-light); cursor: pointer; transition: 0.3s; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="status-badge" id="status">READY</div>
    <h1 id="page-title">STUDY CENTER</h1>
</div>

<div class="tabs-container">
    <div class="tab active" onclick="setLang('Thai')">THAI</div>
    <div class="tab" onclick="setLang('Chinese')">CHINESE</div>
    <div class="tab" onclick="setLang('Korean')">KOREAN</div>
</div>

<div id="view-study" class="container">
    <div class="controls">
        <select id="study-chapter" onchange="loadData()">
            <option value="01">Chapter 01</option>
            <option value="02">Chapter 02</option>
        </select>
        <select id="study-mode" onchange="renderStudy()">
            <option value="vocab">Vocabulary</option>
            <option value="sentences">Sentences</option>
            <option value="paragraph">Reading</option>
        </select>
    </div>
    <div id="study-display" class="content-card"></div>
</div>

<div id="view-game" class="container hidden">
    <div class="controls">
        <select id="game-chapter" onchange="loadData()">
            <option value="01">Chapter 01</option>
            <option value="02">Chapter 02</option>
        </select>
    </div>
    <div id="game-display" class="content-card"></div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchView('study')">
        <i class="fas fa-book-open"></i><span>Learn</span>
    </div>
    <div class="nav-item" onclick="switchView('game')">
        <i class="fas fa-th-large"></i><span>Match</span>
    </div>
    <div class="nav-item" onclick="location.reload()">
        <i class="fas fa-sync"></i><span>Reset</span>
    </div>
</nav>

<script>
    let currentData = null;
    let currentLang = 'Thai';
    let currentView = 'study';
    let selectedLeft = null;

    function switchView(view) {
        currentView = view;
        document.getElementById('view-study').classList.toggle('hidden', view !== 'study');
        document.getElementById('view-game').classList.toggle('hidden', view !== 'game');
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.innerText.toLowerCase().includes(view));
        });
        
        document.getElementById('page-title').innerText = view === 'study' ? 'STUDY CENTER' : 'MATCHING GAME';
        loadData();
    }

    async function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === lang));
        loadData();
    }

    async function loadData() {
        const chapterSelect = currentView === 'study' ? 'study-chapter' : 'game-chapter';
        const chapter = document.getElementById(chapterSelect).value;
        const status = document.getElementById('status');
        
        try {
            const fileName = `${currentLang}_${chapter}.json`;
            const res = await fetch(fileName);
            if (!res.ok) throw new Error();
            currentData = await res.json();
            status.innerText = `${currentLang} Ch.${chapter}`;
            
            if(currentView === 'study') renderStudy();
            else renderGame();
        } catch (e) {
            status.innerText = "Error Loading";
            const target = currentView === 'study' ? 'study-display' : 'game-display';
            document.getElementById(target).innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:50px;">File <b>${currentLang}_${chapter}.json</b> not found.</p>`;
        }
    }

    function renderStudy() {
        const mode = document.getElementById('study-mode').value;
        const display = document.getElementById('study-display');
        display.innerHTML = `<p style="color:var(--primary); font-weight:800; font-size:10px; margin-bottom:10px;">${currentData.Chapter_name}</p>`;

        if (mode === 'vocab') {
            currentData.Vocabulary_List.split(',').forEach(v => {
                const [word, mean] = v.split('=').map(s => s.trim());
                if(word && mean) display.innerHTML += `<div class="vocab-row"><span class="vocab-word">${word}</span><span class="vocab-mean">${mean}</span></div>`;
            });
        } 
        else if (mode === 'sentences') {
            currentData.Sentences.split(';').forEach(s => {
                const [target, trans] = s.split(':').map(i => i.trim());
                if(target && trans) display.innerHTML += `<div class="sentence-box"><div class="s-target">${target}</div><div class="s-trans">${trans}</div></div>`;
            });
        } 
        else if (mode === 'paragraph') {
            display.innerHTML += `<div style="font-size:17px; line-height:2.2; color:#eee; white-space:pre-line;">${currentData.Paragraph}</div>`;
        }
    }

    function renderGame() {
        const display = document.getElementById('game-display');
        const list = currentData.Vocabulary_List.split(',').map(v => {
            const p = v.split('=').map(s => s.trim());
            return { t: p[0], e: p[1] };
        }).filter(x => x.t && x.e).sort(() => 0.5 - Math.random()).slice(0, 5);

        const leftSide = [...list].sort(() => 0.5 - Math.random());
        const rightSide = [...list].sort(() => 0.5 - Math.random());

        display.innerHTML = `<h3 style="text-align:center; font-size:11px; color:var(--primary); letter-spacing:1px;">TAP ENGLISH THEN THAI</h3><div class="game-grid" id="g"></div>`;
        const g = document.getElementById('g');
        
        for(let i=0; i<list.length; i++) {
            g.innerHTML += `<div class="m-btn" data-v="${leftSide[i].t}" onclick="match(this, 'L')">${leftSide[i].e}</div>`;
            g.innerHTML += `<div class="m-btn" data-v="${rightSide[i].t}" onclick="match(this, 'R')">${rightSide[i].t}</div>`;
        }
    }

    function match(btn, side) {
        if(btn.classList.contains('matched')) return;
        if(side === 'L') {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('selected'));
            selectedLeft = btn;
            btn.classList.add('selected');
        } else {
            if(!selectedLeft) return;
            if(selectedLeft.dataset.v === btn.dataset.v) {
                selectedLeft.classList.add('matched');
                btn.classList.add('matched');
                selectedLeft = null;
                if(document.querySelectorAll('.m-btn:not(.matched)').length === 0) {
                    document.getElementById('game-display').innerHTML += `<div style="text-align:center; margin-top:20px; color:var(--accent)"><h3>COMPLETED!</h3><button onclick="renderGame()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:10px;">Play Again</button></div>`;
                }
            } else {
                btn.style.borderColor = "#ff7675";
                setTimeout(() => btn.style.borderColor = "rgba(255,255,255,0.08)", 500);
            }
        }
    }

    window.onload = () => setLang('Thai');
</script>
</body>
</html>
