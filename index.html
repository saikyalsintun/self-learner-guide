<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polyglot Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/pinyin-pro"></script>

    <style>
        :root {
            --primary: #6C5CE7; --accent: #00CEC9; --bg: #0C0C1E;
            --card-bg: rgba(30, 30, 50, 0.9); --text: #F1F2F6; --text-light: #A4A4B5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-thai: 'Sarabun', sans-serif; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-main);
            margin: 0; background: var(--bg); color: var(--text); 
            line-height: 1.6; padding-bottom: 120px; overflow-x: hidden;
        }
        .vocab-word, .s-target, .paragraph-text, .m-btn, input { font-family: var(--font-thai), var(--font-main); }
        .header { padding: 45px 20px 15px; text-align: center; }
        .status-badge { font-size: 10px; letter-spacing: 2.5px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        h1 { margin: 8px 0 0; font-weight: 800; font-size: 22px; color: #fff; letter-spacing: -0.5px; }
        
        /* Language Tab Styling */
        .tabs-container { display: flex; gap: 10px; padding: 20px; overflow-x: auto; scrollbar-width: none; justify-content: center; }
        .tab { 
            padding: 11px 22px; border-radius: 12px; background: var(--card-bg); 
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 13px;
            color: var(--text-light); border: 1px solid rgba(255,255,255,0.05);
        }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }

        .container { max-width: 500px; margin: 0 auto; padding: 0 20px; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        select, input { 
            width: 100%; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 16px; border-radius: 16px; font-size: 15px; outline: none;
        }
        .content-card { 
            background: var(--card-bg); border-radius: 30px; padding: 28px; 
            border: 1px solid rgba(255,255,255,0.05); min-height: 400px; 
        }
        .vocab-row { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .vocab-word { font-size: 22px; font-weight: 600; color: #fff; display: block; }
        .vocab-mean { font-size: 14px; color: var(--text-light); }
        .fa-volume-high { float: right; color: var(--primary); font-size: 14px; margin-top: 10px; opacity: 0.6; }
        
        .audio-popup {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 20px; font-weight: 600; font-size: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .audio-popup.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .m-btn { 
            padding: 14px; border-radius: 18px; background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.08); color: #fff; cursor: pointer;
            min-height: 75px; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .m-btn.selected { background: var(--primary); border-color: var(--accent); }
        .m-btn.matched { opacity: 0; pointer-events: none; }

        .nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            background: rgba(10, 10, 25, 0.95); backdrop-filter: blur(20px); 
            padding: 14px 25px; border-radius: 40px; display: flex; gap: 30px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-light); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .hidden { display: none; }
        .submit-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="status-badge" id="status">Ready</div>
    <h1>Polyglot Flow</h1>
</div>

<div class="tabs-container">
    <div class="tab active" onclick="switchLang('Thai')">THAI</div>
    <div class="tab" onclick="switchLang('Chinese')">CHINESE</div>
    <div class="tab" onclick="switchLang('Korean')">KOREAN</div>
</div>

<div id="audio-toast" class="audio-popup"></div>

<div id="view-study" class="container">
    <div class="controls">
        <select id="study-chapter" onchange="renderStudy()"></select>
        <select id="study-mode" onchange="renderStudy()">
            <option value="vocab">Vocabulary List</option>
            <option value="sentences">Example Sentences</option>
            <option value="paragraph">Reading Paragraph</option>
        </select>
    </div>
    <div id="study-display" class="content-card"></div>
</div>

<div id="view-game" class="container hidden">
    <div class="controls"><select id="game-chapter" onchange="resetGame()"></select></div>
    <div id="game-display" class="content-card"></div>
</div>

<div id="view-upload" class="container hidden">
    <div class="content-card">
        <span class="status-badge">Add New to <span id="target-lang-label">Thai</span></span>
        <div style="margin-top:20px;"></div>
        <input type="text" id="in-topic" placeholder="Category" style="margin-bottom:12px;">
        <input type="text" id="in-word" placeholder="Target Word" style="margin-bottom:12px;">
        <input type="text" id="in-mean" placeholder="Translation" style="margin-bottom:12px;">
        <button class="submit-btn" id="save-btn" onclick="submitNewWord()">SAVE TO CLOUD</button>
    </div>
</div>

<div id="view-star" class="container hidden">
    <div id="star-display" class="content-card"></div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchView('study')"><i class="fas fa-book-open"></i><span>Learn</span></div>
    <div class="nav-item" onclick="switchView('game')"><i class="fas fa-layer-group"></i><span>Match</span></div>
    <div class="nav-item" onclick="switchView('upload')"><i class="fas fa-cloud-upload-alt"></i><span>Add</span></div>
    <div class="nav-item" onclick="switchView('star')"><i class="fas fa-star"></i><span>My List</span></div>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZdK3xJD4uSHxs6KKqNpx8XEj7fwNrodO3ldnrrdUzLv5tUosacAvmDRBq-u-tIaYk/exec";
    let rawData = null;
    let customData = []; 
    let currentLang = 'Thai';
    let currentView = 'study';
    let selectedLeft = null;
    let gamePool = []; 

    const fileMap = { 'Thai': 'Thai.json', 'Chinese': 'chinese.json', 'Korean': 'korea.json' };
    const { pinyin } = pinyinPro;

    // Core Language Switcher (Optimized for Speed)
    async function switchLang(lang) {
        if(currentLang === lang && rawData) return;
        currentLang = lang;
        
        // Instant UI feedback
        document.getElementById('target-lang-label').innerText = lang;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === lang.toUpperCase()));
        document.getElementById('status').innerText = "Loading...";

        // Start both fetches, but prioritize JSON
        fetchLocalJSON();
        fetchCloudData();
    }

    async function fetchLocalJSON() {
        try {
            const response = await fetch(`./${fileMap[currentLang]}?v=${Date.now()}`);
            const data = await response.json();
            rawData = Array.isArray(data) ? data : [data];
            populateChapters();
            if(currentView === 'study') renderStudy();
            if(currentView === 'game') resetGame();
            document.getElementById('status').innerText = "Local Synced";
        } catch (e) { console.error("JSON Error"); }
    }

    async function fetchCloudData() {
        try {
            const cloudRes = await fetch(SCRIPT_URL);
            customData = await cloudRes.json();
            document.getElementById('status').innerText = "Cloud Live";
            if(currentView === 'star') renderStarList();
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function populateChapters() {
        const sSel = document.getElementById('study-chapter');
        const gSel = document.getElementById('game-chapter');
        const opts = rawData.map((ch, i) => `<option value="${i}">${ch.Chapter_name || 'Chapter '+(i+1)}</option>`).join('');
        sSel.innerHTML = opts;
        gSel.innerHTML = `<option value="cloud">⭐ My Saved Words</option>` + opts;
    }

    function renderStudy() {
        const idx = document.getElementById('study-chapter').value || 0;
        const mode = document.getElementById('study-mode').value;
        const display = document.getElementById('study-display');
        if(!rawData || !rawData[idx]) return;
        const ch = rawData[idx];
        display.innerHTML = `<span class="status-badge">${ch.Chapter_name}</span><div style="margin-top:20px;"></div>`;
        
        if (mode === 'vocab') {
            (ch.Vocabulary_List || "").split(',').forEach(v => {
                const p = v.split('=').map(s => s.trim());
                if(p.length >= 2) display.innerHTML += `<div class="vocab-row" onclick="speak('${p[0]}', '${currentLang}')"><i class="fa-solid fa-volume-high"></i><span class="vocab-word">${p[0]}</span><span class="vocab-mean">${p[1]}</span></div>`;
            });
        } else if (mode === 'sentences') {
            (ch.Sentences || "").split(';').forEach(s => {
                const p = s.split(':').map(i => i.trim());
                if(p.length >= 2) display.innerHTML += `<div class="sentence-box" onclick="speak('${p[0]}', '${currentLang}')"><div class="s-target">${p[0]}</div><div class="s-trans">${p[1]}</div></div>`;
            });
        } else if (mode === 'paragraph') {
            display.innerHTML += `<div class="paragraph-text" onclick="speak(this.innerText, '${currentLang}')">${ch.Paragraph || "..."}</div>`;
        }
    }

    // TTS & Auto-Pinyin
    function speak(text, lang) {
        window.speechSynthesis.cancel(); 
        let dText = text, sText = text;

        if (lang === 'Chinese') {
            sText = text.replace(/[^\u4e00-\u9fa5]/g, '');
            if (!/[a-zA-Z]/.test(text)) dText = `${sText} (${pinyin(sText)})`;
        } else if (lang === 'Thai') sText = text.replace(/[^\u0E00-\u0E7F]/g, '');
        else if (lang === 'Korean') sText = text.replace(/[^\uAC00-\uD7AF]/g, '');

        const toast = document.getElementById('audio-toast');
        toast.innerText = dText; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);

        if (sText.trim().length > 0) {
            const msg = new SpeechSynthesisUtterance(sText);
            msg.lang = { 'Thai': 'th-TH', 'Chinese': 'zh-CN', 'Korean': 'ko-KR' }[lang];
            msg.rate = 0.9; 
            window.speechSynthesis.speak(msg);
        }
    }

    function switchView(view) {
        currentView = view;
        ['view-study', 'view-game', 'view-upload', 'view-star'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.innerText.toLowerCase().includes(view === 'study' ? 'learn' : view)));
        if(view === 'game') resetGame(); 
        if(view === 'star') renderStarList();
    }

    function resetGame() {
        const sel = document.getElementById('game-chapter').value;
        if (sel === "cloud") {
            const filtered = customData.filter(item => item.lang === currentLang);
            if(filtered.length < 2) {
                document.getElementById('game-display').innerHTML = `<p style='text-align:center; padding-top:100px;'>Add at least 2 words first!</p>`;
                return;
            }
            gamePool = filtered.map(item => ({ t: item.target, e: item.trans }));
        } else {
            if(!rawData) return;
            const ch = rawData[sel || 0];
            gamePool = (ch.Vocabulary_List || "").split(',').map(v => {
                const p = v.split('=').map(s => s.trim());
                return { t: p[0], e: p[1] };
            }).filter(x => x.t && x.e);
        }
        renderGameRound();
    }

    function renderGameRound() {
        const display = document.getElementById('game-display');
        if (gamePool.length === 0) {
            display.innerHTML = `<div style="text-align:center; padding-top:60px;"><h2>COMPLETE</h2><button class="submit-btn" onclick="resetGame()">REPLAY</button></div>`;
            return;
        }
        const round = gamePool.slice(0, 5);
        const left = [...round].sort(() => Math.random() - 0.5);
        const right = [...round].sort(() => Math.random() - 0.5);
        display.innerHTML = `<div class="grid" id="g"></div>`;
        left.forEach((it, i) => {
            document.getElementById('g').innerHTML += `<div class="m-btn" data-v="${left[i].t}" onclick="match(this, 'L')">${left[i].e}</div>`;
            document.getElementById('g').innerHTML += `<div class="m-btn" data-v="${right[i].t}" onclick="match(this, 'R')">${right[i].t}</div>`;
        });
    }

    function match(btn, side) {
        if(btn.classList.contains('matched')) return;
        if(side === 'L') {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('selected'));
            selectedLeft = btn; btn.classList.add('selected');
        } else if(selectedLeft && selectedLeft.dataset.v === btn.dataset.v) {
            speak(btn.dataset.v, currentLang);
            selectedLeft.classList.add('matched'); btn.classList.add('matched');
            selectedLeft = null;
            if(document.querySelectorAll('.m-btn:not(.matched)').length === 0) {
                gamePool = gamePool.slice(5); setTimeout(renderGameRound, 600);
            }
        }
    }

    function renderStarList() {
        const display = document.getElementById('star-display');
        const filtered = customData.filter(item => item.lang === currentLang);
        display.innerHTML = `<span class="status-badge">My ${currentLang} List</span><div style="margin-top:20px;"></div>`;
        if(filtered.length === 0) display.innerHTML += "<p style='text-align:center; padding-top:100px;'>Empty.</p>";
        filtered.reverse().forEach(item => {
            display.innerHTML += `<div class="vocab-row" onclick="speak('${item.target}', '${currentLang}')"><span class="vocab-word">${item.target}</span><span class="vocab-mean">${item.trans}</span></div>`;
        });
    }

    async function submitNewWord() {
        const payload = { lang: currentLang, topic: document.getElementById('in-topic').value, target: document.getElementById('in-word').value, trans: document.getElementById('in-mean').value };
        if(!payload.target || !payload.trans) return;
        document.getElementById('save-btn').innerText = "SAVING...";
        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            document.getElementById('in-word').value = ""; document.getElementById('in-mean').value = "";
            fetchCloudData();
            switchView('star');
        } catch (e) { alert("Error"); }
        document.getElementById('save-btn').innerText = "SAVE TO CLOUD";
    }

    window.onload = () => switchLang('Thai');
</script>
</body>
</html>
