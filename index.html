<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6C5CE7">
    <title>PolyglotFlow Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F1F5F9; --surface: #FFFFFF; --text-main: #1E293B; --text-sub: #64748B;
            --primary: #6C5CE7; --secondary: #00CEC9; --shadow: rgba(108, 92, 231, 0.08);
        }
        [data-theme="dark"] {
            --bg: #0F172A; --surface: #1B263B; --text-main: #F1F5F9; --text-sub: #94A3B8;
            --primary: #A29BFE; --shadow: rgba(0, 0, 0, 0.3);
        }

        body { 
            font-family: 'Inter', 'Noto Sans Thai', 'Noto Sans KR', sans-serif; 
            margin: 0; background: var(--bg); color: var(--text-main); 
            transition: 0.3s; padding-bottom: 100px;
        }

        .sticky-header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--surface); border-bottom: 1px solid var(--shadow);
        }

        .top-bar { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }

        .lang-switcher {
            display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto;
            scrollbar-width: none; border-top: 1px solid rgba(0,0,0,0.05);
        }
        .mini-pill {
            padding: 8px 16px; border-radius: 20px; background: var(--bg);
            border: 2px solid transparent; white-space: nowrap; font-size: 13px; font-weight: 700; cursor: pointer;
            transition: 0.2s;
        }
        .mini-pill.active { border-color: var(--primary); color: var(--primary); background: var(--surface); transform: scale(1.05); }

        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .card { background: var(--surface); margin-bottom: 12px; padding: 24px; border-radius: 22px; box-shadow: 0 4px 12px var(--shadow); }

        .entry-row { padding: 15px 0; border-bottom: 1px solid var(--bg); display: flex; flex-direction: column; gap: 6px; }
        .entry-row:last-child { border-bottom: none; }
        
        .foreign-text { font-size: 20px; line-height: 1.5; color: var(--primary); font-weight: 600; word-break: break-word; }
        .translation-text { font-size: 15px; color: var(--text-sub); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid var(--bg);
            background: var(--bg); color: var(--text-main); font-size: 16px; box-sizing: border-box; font-family: inherit;
        }
        textarea { resize: none; height: 80px; }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: var(--primary); color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.97); }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: var(--surface); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--shadow);
        }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; text-align: center; }
        .nav-btn span { display: block; font-size: 10px; font-weight: 800; margin-top: 4px; text-transform: uppercase; }
        .nav-btn.active { color: var(--primary); }

        .topic-tag { font-size: 11px; color: var(--primary); font-weight: 800; background: var(--bg); padding: 4px 10px; border-radius: 6px; margin-bottom: 12px; display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="top-bar">
            <h2 style="margin:0; font-size: 18px;">PolyglotFlow</h2>
            <div id="sync-dot" style="font-size: 12px; color: #ccc;">●</div>
            <div onclick="toggleTheme()" style="cursor:pointer; font-size: 20px;">🌓</div>
        </div>
        <div class="lang-switcher">
            <div class="mini-pill" onclick="selectLang('Thai')" data-lang="Thai">🇹🇭 Thai</div>
            <div class="mini-pill" onclick="selectLang('Chinese')" data-lang="Chinese">🇨🇳 Chinese</div>
            <div class="mini-pill" onclick="selectLang('Korean')" data-lang="Korean">🇰🇷 Korean</div>
        </div>
    </div>

    <div id="screen-input" class="screen container">
        <div class="card">
            <div class="input-group">
                <label>Topic Context</label>
                <select id="topic-select" onchange="toggleTopicInput()"></select>
                <input type="text" id="topic-new" placeholder="Create new topic..." style="margin-top:8px">
            </div>
            <div class="input-group">
                <label id="target-label">Thai Sentence</label>
                <textarea id="word-target" placeholder="Enter target language text..."></textarea>
            </div>
            <div class="input-group">
                <label>Translation (Your Language)</label>
                <textarea id="word-translation" placeholder="Enter the meaning..."></textarea>
            </div>
            <button class="btn-main" onclick="saveVocab()">Save Entry</button>
        </div>
    </div>

    <div id="screen-list" class="screen hidden container">
        <div id="list-container"></div>
    </div>

    <div id="screen-quiz" class="screen hidden container">
        <div class="card" id="quiz-content" style="text-align:center; min-height: 300px; display: flex; flex-direction: column; justify-content: center;">
            </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" id="nav-input" onclick="navTo('screen-input')">✍️<span>Add</span></button>
        <button class="nav-btn" id="nav-list" onclick="navTo('screen-list')">📚<span>Library</span></button>
        <button class="nav-btn" id="nav-quiz" onclick="navTo('screen-quiz')">⚡<span>Quiz</span></button>
    </nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZdK3xJD4uSHxs6KKqNpx8XEj7fwNrodO3ldnrrdUzLv5tUosacAvmDRBq-u-tIaYk/exec";
    let currentLang = 'Thai';
    let currentScreen = 'screen-input';

    window.onload = () => {
        selectLang('Thai');
        if(localStorage.getItem('apex-theme') === 'dark') toggleTheme();
    };

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('apex-theme', theme);
    }

    function selectLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.mini-pill').forEach(p => p.classList.toggle('active', p.dataset.lang === lang));
        document.getElementById('target-label').innerText = `${lang} Sentence`;
        updateTopicDropdown();
        
        if (currentScreen === 'screen-list') renderList();
        if (currentScreen === 'screen-quiz') setupQuiz();
        
        syncFromCloud();
    }

    function navTo(screenId) {
        currentScreen = screenId;
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + screenId.split('-')[1]).classList.add('active');

        if(screenId === 'screen-list') renderList();
        if(screenId === 'screen-quiz') setupQuiz();
    }

    function getLocalData() { return JSON.parse(localStorage.getItem('poly_' + currentLang)) || {}; }

    function updateTopicDropdown() {
        const data = getLocalData();
        const select = document.getElementById('topic-select');
        select.innerHTML = '<option value="NEW">+ New Topic</option>';
        Object.keys(data).forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        toggleTopicInput();
    }

    function toggleTopicInput() {
        document.getElementById('topic-new').style.display = document.getElementById('topic-select').value === "NEW" ? 'block' : 'none';
    }

    async function syncFromCloud() {
        const dot = document.getElementById('sync-dot');
        dot.style.color = "#F1C40F";
        try {
            const res = await fetch(SCRIPT_URL);
            const cloudData = await res.json();
            const organized = {};
            cloudData.forEach(item => {
                if (item.lang === currentLang) {
                    if (!organized[item.topic]) organized[item.topic] = [];
                    organized[item.topic].push({ target: item.target, trans: item.trans });
                }
            });
            localStorage.setItem('poly_' + currentLang, JSON.stringify(organized));
            dot.style.color = "#2ECC71";
            updateTopicDropdown();
            if (currentScreen === 'screen-list') renderList();
        } catch (e) { dot.style.color = "#E74C3C"; }
    }

    async function saveVocab() {
        const select = document.getElementById('topic-select');
        const topic = select.value === "NEW" ? document.getElementById('topic-new').value.trim() : select.value;
        const target = document.getElementById('word-target').value.trim();
        const trans = document.getElementById('word-translation').value.trim();

        if(!topic || !target || !trans) return;

        const data = getLocalData();
        if(!data[topic]) data[topic] = [];
        data[topic].push({ target, trans });
        localStorage.setItem('poly_' + currentLang, JSON.stringify(data));

        document.getElementById('word-target').value = '';
        document.getElementById('word-translation').value = '';
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ lang: currentLang, topic, target, trans })
        });
        
        navTo('screen-list');
    }

    function renderList() {
        const data = getLocalData();
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        const topics = Object.keys(data);
        if(topics.length === 0) {
            container.innerHTML = '<div class="card" style="text-align:center; color:var(--text-sub)">No data for this language yet.</div>';
            return;
        }

        for (let topic in data) {
            let html = `<div class="card"><div class="topic-tag">${topic}</div>`;
            data[topic].forEach(item => {
                html += `<div class="entry-row">
                    <div class="foreign-text">${item.target}</div>
                    <div class="translation-text">${item.trans}</div>
                </div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    // --- FLIPPED QUIZ LOGIC ---
    function setupQuiz() {
        const data = getLocalData();
        let all = [];
        for(let t in data) data[t].forEach(w => all.push({...w, topic: t}));
        const area = document.getElementById('quiz-content');
        if(!all.length) { area.innerHTML = "<h3>Add some words first!</h3>"; return; }

        const q = all[Math.floor(Math.random() * all.length)];
        
        // Logic: Question is TRANSLATION, Answer is FOREIGN
        area.innerHTML = `
            <div class="topic-tag" style="align-self:center">${q.topic}</div>
            <div style="font-size:12px; color:var(--text-sub); margin-bottom:10px; font-weight:800; text-transform:uppercase">How do you say:</div>
            <h1 style="margin:0 0 25px 0; font-size: 28px; line-height:1.2; color:var(--text-main)">${q.trans}</h1>
            
            <div class="input-group">
                <textarea id="q-ans" placeholder="Type in ${currentLang}..." style="text-align:center; height: 100px; font-size: 18px;"></textarea>
            </div>
            
            <button class="btn-main" onclick="checkQuiz('${q.target.replace(/'/g, "\\'")}')">Check Answer</button>
        `;
        
        // Auto-focus the input for faster flow
        setTimeout(() => document.getElementById('q-ans').focus(), 100);
    }

    function checkQuiz(correct) {
        const userAns = document.getElementById('q-ans').value.trim();
        
        if (userAns.toLowerCase() === correct.toLowerCase()) {
            alert("✨ Perfect! \n\n" + correct);
            setupQuiz();
        } else {
            alert("Not quite!\n\nExpected: " + correct + "\nTyped: " + userAns);
        }
    }
</script>
</body>
</html>
